<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="thank-you.css">
    <link rel="stylesheet" href="style.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
        <link rel="icon" href="images/book-cover.png" type="image/png">
    <!-- Meta Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '785774641243821');
    fbq('track', 'PageView');
    fbq('track', 'Purchase', { value: 3000, currency: 'NGN' });
  </script>
</head>
<body>
    <noscript>
        <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=785774641243821&ev=PageView&noscript=1"/>
    </noscript>
    <!-- Thank-you.html -->
    <div id="thank-you">
       <div class="contents">
            <div class="img-container">
                <div class="hero-visual">
                    <div class="book-glow"></div>
                    <div class="book-wrap">
                        <div class="book-scene">
                            <div class="book-3d thank-you">
                                <div class="book-front thank-you">
                                    <!-- Replace src with your actual cover image path -->
                                    <img src="images/book-cover.png" alt="How to Advertise on Facebook & Instagram Without Wasting Money"/>
                                </div>
                                <div class="book-spine thank-you">
                                    <span class="spine-text">How to Advertise on Facebook & Instagram Without Wasting Money</span>
                                </div>
                                <div class="book-top thank-you"></div>
                                <div class="book-bottom thank-you"></div>
                            </div>
                        </div>
                        <div class="book-shadow-el"></div>
                    </div>
                </div>
            </div>
            <div class="right">
                <div class="svg-container">
                    <img src="images/thank-you.svg" alt="">
                </div>
                <div class="text">Please check your email for your eBook and download it before the link expires. Check the spam folder if you didnt see it in your inbox. If you have any issues, kindly <span class="contactBtn">contact us.</span></div>
            </div> 
       </div>
    </div>

    <div id="contact-container"></div>

    <script>
            const btn = document.querySelector(".contactBtn");
            
            btn.addEventListener("click", function () {
            fetch("contact.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("contact-container").innerHTML = data;
                    document.getElementById("popup-overlay").style.display = "flex";
                
                    // Close functionality
                    document.getElementById("close-popup").onclick = function () {
                        document.getElementById("popup-overlay").style.display = "none";
                    };
                });
            });
        
    </script>

</body>
</html>
